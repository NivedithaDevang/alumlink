<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AMC AlumLink — Reset Password</title>
<link rel="stylesheet" href="/static/css/main.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="auth-logo">A</div>
      <h1>AMC AlumLink</h1>
      <p>Administrative Management College</p>
    </div>
    <div class="auth-taglines">
      <div class="tagline-item"><i class="fas fa-handshake"></i> Connect with alumni</div>
      <div class="tagline-item"><i class="fas fa-briefcase"></i> Discover opportunities</div>
      <div class="tagline-item"><i class="fas fa-graduation-cap"></i> Grow your career</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <div id="errorContainer">
        <h2>Password Reset Link Expired</h2>
        <p class="auth-subtitle" style="color: #dc2626;">{{ error }}</p>
        <p class="auth-link" style="text-align: center; margin-top: 20px;">
          <a href="/forgot-password"><i class="fas fa-redo"></i> Request a new reset link</a>
        </p>
      </div>
      <div id="formContainer" {% if error %}style="display: none;"{% endif %}>
        <h2>Reset Your Password</h2>
        <p class="auth-subtitle">Enter your new password below</p>
        <div id="authError" class="alert alert-error hidden"></div>
        <div id="authSuccess" class="alert alert-success hidden"></div>
        
        <div class="form-group">
          <label>New Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••"/>
            <button type="button" class="toggle-password" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
          </div>
          <small style="color: #666; margin-top: 5px; display: block;">At least 6 characters</small>
        </div>
        
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="••••••••"/>
            <button type="button" class="toggle-password" onclick="toggleConfirmPwd()"><i class="fas fa-eye" id="eyeIcon2"></i></button>
          </div>
        </div>
        
        <button class="btn-primary btn-full" id="resetBtn" onclick="doReset()">
          <span>Reset Password</span><i class="fas fa-arrow-right"></i>
        </button>
        
        <p class="auth-link" style="text-align: center; margin-top: 15px;">
          <a href="/login"><i class="fas fa-arrow-left"></i> Back to login</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
const token = "{{ token }}";

function togglePwd(){
  const p = document.getElementById('password');
  const e = document.getElementById('eyeIcon');
  if(p.type === 'password'){
    p.type = 'text';
    e.className = 'fas fa-eye-slash';
  } else {
    p.type = 'password';
    e.className = 'fas fa-eye';
  }
}

function toggleConfirmPwd(){
  const p = document.getElementById('confirmPassword');
  const e = document.getElementById('eyeIcon2');
  if(p.type === 'password'){
    p.type = 'text';
    e.className = 'fas fa-eye-slash';
  } else {
    p.type = 'password';
    e.className = 'fas fa-eye';
  }
}

async function doReset(){
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const err = document.getElementById('authError');
  const succ = document.getElementById('authSuccess');
  
  err.classList.add('hidden');
  succ.classList.add('hidden');
  
  if(!password || !confirmPassword){
    err.textContent = 'Please fill all fields';
    err.classList.remove('hidden');
    return;
  }
  
  if(password.length < 6){
    err.textContent = 'Password must be at least 6 characters';
    err.classList.remove('hidden');
    return;
  }
  
  if(password !== confirmPassword){
    err.textContent = 'Passwords do not match';
    err.classList.remove('hidden');
    return;
  }
  
  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
  
  const r = await fetch(`/reset-password/${token}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password})
  });
  
  const d = await r.json();
  btn.disabled = false;
  btn.innerHTML = '<span>Reset Password</span><i class="fas fa-arrow-right"></i>';
  
  if(d.error){
    err.textContent = d.error;
    err.classList.remove('hidden');
    return;
  }
  
  if(d.success){
    succ.textContent = '✓ Password reset successfully! Redirecting to login...';
    succ.classList.remove('hidden');
    setTimeout(() => {
      window.location.href = '/login';
    }, 2000);
  }
}

document.addEventListener('keydown', e => {
  if(e.key === 'Enter' && token) doReset();
});
</script>
</body>
</html>
