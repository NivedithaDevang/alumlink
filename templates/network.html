{% extends "base.html" %}
{% block title %}My Network — AMC AlumLink{% endblock %}
{% block content %}
<div class="network-page">
  <div class="network-tabs">
    <button class="tab-btn active" onclick="showTab('connections',this)">Connections</button>
    <button class="tab-btn" onclick="showTab('pending',this)">Pending <span class="tab-badge" id="pendingCount"></span></button>
    <button class="tab-btn" onclick="showTab('discover',this)">Discover Alumni</button>
  </div>

  <div id="tab-connections" class="tab-content">
    <h3 class="section-title">Your Connections</h3>
    <div id="connectionsList" class="users-grid"></div>
  </div>

  <div id="tab-pending" class="tab-content hidden">
    <h3 class="section-title">Received Requests</h3>
    <div id="receivedList" class="users-grid"></div>
    <h3 class="section-title mt-4">Sent Requests</h3>
    <div id="sentList" class="users-grid"></div>
  </div>

  <div id="tab-discover" class="tab-content hidden">
    <div class="discover-filters">
      <input type="text" id="discoverSearch" placeholder="Search by name..."/>
      <select id="discoverDept"><option value="">All Departments</option>
        <option>BCA</option><option>BBA</option><option>MBA</option>
        <option>MCA</option><option>B.Com</option><option>M.Com</option>
      </select>
      <select id="discoverRole"><option value="">All Roles</option>
        <option value="alumni">Alumni</option><option value="student">Students</option>
      </select>
      <input type="text" id="discoverBatch" placeholder="Batch year (alumni)"/>
      <input type="text" id="discoverSkill" placeholder="Skill"/>
      <button class="btn-primary" onclick="discoverSearch()"><i class="fas fa-search"></i> Search</button>
    </div>
    <div id="discoverList" class="users-grid"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/network.js"></script>
{% endblock %}
