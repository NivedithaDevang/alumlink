<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}AMC AlumLink{% endblock %}</title>
<link rel="stylesheet" href="/static/css/main.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
{% block head %}{% endblock %}
</head>
<body>

{% if session.user_id %}
<nav class="navbar">
  <div class="nav-inner">
    <a href="/feed" class="nav-brand">
      <div class="brand-icon">A</div>
      <span class="brand-text">AlumLink</span>
    </a>
    <div class="nav-search">
      <i class="fas fa-search"></i>
      <input type="text" id="globalSearch" placeholder="Search alumni, students, posts..." autocomplete="off"/>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <div class="nav-links">
      <a href="/feed" class="nav-item {% if request.path=='/feed' %}active{% endif %}">
        <i class="fas fa-home"></i><span>Home</span>
      </a>
      <a href="/network" class="nav-item {% if request.path=='/network' %}active{% endif %}">
        <i class="fas fa-users"></i><span>Network</span>
      </a>
      <a href="/messages" class="nav-item {% if request.path=='/messages' %}active{% endif %}">
        <i class="fas fa-comment-dots"></i><span>Messages</span>
      </a>
      <a href="/notifications" class="nav-item {% if request.path=='/notifications' %}active{% endif %}" id="notifNavItem">
        <i class="fas fa-bell"></i><span>Alerts</span>
        <span class="nav-badge hidden" id="notifBadge"></span>
      </a>
      {% if session.role == 'admin' %}
      <a href="/admin" class="nav-item {% if request.path=='/admin' %}active{% endif %}">
        <i class="fas fa-shield-halved"></i><span>Admin</span>
      </a>
      {% endif %}
    </div>
    <div class="nav-profile" id="navProfileBtn">
      <img src="" alt="" class="nav-avatar" id="navAvatar"/>
      <span id="navName"></span>
      <i class="fas fa-chevron-down nav-chevron"></i>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="/profile"><i class="fas fa-user"></i> My Profile</a>
        <a href="/saved"><i class="fas fa-bookmark"></i> Saved Posts</a>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>
</nav>
{% endif %}

<main class="main-content">
{% block content %}{% endblock %}
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
