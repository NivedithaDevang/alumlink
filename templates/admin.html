{% extends "base.html" %}
{% block title %}Admin Panel — AMC AlumLink{% endblock %}
{% block content %}
<div class="admin-page">
  <div class="admin-header card">
    <h2><i class="fas fa-shield-halved"></i> Admin Panel</h2>
    <p>Administrative Management College — Faculty Dashboard</p>
  </div>
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="adminTab('users',this)"><i class="fas fa-users"></i> Users</button>
    <button class="tab-btn" onclick="adminTab('reports',this)"><i class="fas fa-flag"></i> Reports</button>
    <button class="tab-btn" onclick="adminTab('posts',this)"><i class="fas fa-newspaper"></i> All Posts</button>
    <button class="tab-btn" onclick="adminTab('create_admin',this)"><i class="fas fa-user-plus"></i> Create Admin</button>
  </div>

  <div id="admin-tab-users" class="tab-content">
    <div class="admin-filters">
      <input type="text" id="userSearchInput" placeholder="Search users..." oninput="filterAdminUsers()"/>
      <select id="userRoleFilter" onchange="filterAdminUsers()">
        <option value="">All Roles</option>
        <option value="student">Students</option>
        <option value="alumni">Alumni</option>
        <option value="admin">Admins</option>
      </select>
    </div>
    <div id="adminUsersList" class="admin-table-wrap"></div>
  </div>

  <div id="admin-tab-reports" class="tab-content hidden">
    <div id="adminReportsList"></div>
  </div>

  <div id="admin-tab-posts" class="tab-content hidden">
    <div id="adminPostsList"></div>
  </div>

  <div id="admin-tab-create_admin" class="tab-content hidden">
    <div class="card" style="max-width:500px;padding:2rem">
      <h3>Create Admin / Faculty Account</h3>
      <div class="form-group"><label>Name</label><input type="text" id="newAdminName" placeholder="Faculty Name"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="newAdminEmail" placeholder="faculty@amc.edu"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="newAdminPwd" placeholder="Password"/></div>
      <div class="form-group"><label>Department</label><input type="text" id="newAdminDept" placeholder="Department"/></div>
      <div class="form-group"><label>Faculty ID</label><input type="text" id="newAdminFacId" placeholder="FAC001"/></div>
      <div id="adminCreateMsg" class="alert hidden"></div>
      <button class="btn-primary" onclick="createAdmin()">Create Account</button>
    </div>
  </div>
</div>

<!-- Report Modal -->
<div class="modal-overlay hidden" id="reportModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Report User</h3>
      <button class="modal-close" onclick="document.getElementById('reportModal').classList.add('hidden')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="reportUserId"/>
      <div class="form-group">
        <label>Reason for report</label>
        <textarea id="reportReason" rows="4" placeholder="Describe why this account is suspicious or violating guidelines..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="document.getElementById('reportModal').classList.add('hidden')">Cancel</button>
      <button class="btn-danger" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/feed.js"></script>
<script src="/static/js/admin.js"></script>
{% endblock %}
