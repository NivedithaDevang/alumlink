<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AMC AlumLink — Forgot Password</title>
<link rel="stylesheet" href="/static/css/main.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="auth-logo">A</div>
      <h1>AMC AlumLink</h1>
      <p>Administrative Management College</p>
    </div>
    <div class="auth-taglines">
      <div class="tagline-item"><i class="fas fa-handshake"></i> Connect with alumni</div>
      <div class="tagline-item"><i class="fas fa-briefcase"></i> Discover opportunities</div>
      <div class="tagline-item"><i class="fas fa-graduation-cap"></i> Grow your career</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h2>Forgot Password?</h2>
      <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password</p>
      <div id="authError" class="alert alert-error hidden"></div>
      <div id="authSuccess" class="alert alert-success hidden"></div>
      <div id="resetLinkContainer" class="hidden">
        <p style="margin-bottom: 15px; color: #555; font-size: 14px;">
          <i class="fas fa-info-circle" style="color: #2563eb;"></i> 
          Click the link below to reset your password (valid for 1 hour):
        </p>
        <div style="background: #f3f4f6; padding: 12px; border-radius: 8px; margin-bottom: 15px; overflow-wrap: break-word; word-break: break-all;">
          <small id="resetLink" style="color: #2563eb; font-weight: 500;"></small>
        </div>
        <button class="btn-secondary btn-full" onclick="copyResetLink()" style="margin-bottom: 10px;">
          <i class="fas fa-copy"></i> Copy Link
        </button>
      </div>
      <div id="formContainer">
        <div class="form-group">
          <label>Email address</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="your@email.com"/>
          </div>
        </div>
        <button class="btn-primary btn-full" id="resetBtn" onclick="requestReset()">
          <span>Send Reset Link</span><i class="fas fa-arrow-right"></i>
        </button>
      </div>
      <p class="auth-link" style="text-align: center; margin-top: 15px;">
        <a href="/login"><i class="fas fa-arrow-left"></i> Back to login</a>
      </p>
    </div>
  </div>
</div>
<script>
async function requestReset(){
  const email = document.getElementById('email').value.trim();
  const err = document.getElementById('authError');
  const succ = document.getElementById('authSuccess');
  const resetLink = document.getElementById('resetLinkContainer');
  const formContainer = document.getElementById('formContainer');
  const btn = document.getElementById('resetBtn');
  
  err.classList.add('hidden');
  succ.classList.add('hidden');
  
  if(!email){
    err.textContent = 'Please enter your email address';
    err.classList.remove('hidden');
    return;
  }
  
  if(!email.includes('@')){
    err.textContent = 'Please enter a valid email address';
    err.classList.remove('hidden');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
  
  const r = await fetch('/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email})
  });
  
  const d = await r.json();
  btn.disabled = false;
  btn.innerHTML = '<span>Send Reset Link</span><i class="fas fa-arrow-right"></i>';
  
  if(d.reset_url){
    // Show the reset link
    document.getElementById('resetLink').textContent = d.reset_url;
    formContainer.classList.add('hidden');
    resetLink.classList.remove('hidden');
    succ.textContent = 'Reset link generated! Copy it and open it in your browser.';
    succ.classList.remove('hidden');
  } else {
    succ.textContent = d.message || 'If an account exists with this email, a reset link has been sent.';
    succ.classList.remove('hidden');
    formContainer.classList.add('hidden');
  }
}

function copyResetLink(){
  const link = document.getElementById('resetLink').textContent;
  navigator.clipboard.writeText(link).then(() => {
    const btn = event.target.closest('button');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    setTimeout(() => {
      btn.innerHTML = originalText;
    }, 2000);
  });
}

document.addEventListener('keydown', e => {
  if(e.key === 'Enter') requestReset();
});
</script>
</body>
</html>
